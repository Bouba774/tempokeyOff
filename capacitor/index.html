<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0A0D14" />
    <meta name="format-detection" content="telephone=no" />
    <title>TempoKey</title>
    <style>
      html, body, #app { background:#0A0D14; color:#e6e8ee; }
      html, body { margin:0; padding:0; min-height:100dvh; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      /* Boot fallback — replaced by React mount */
      #boot { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
      #boot .dot { width:10px; height:10px; border-radius:50%; background:#7c5cff; box-shadow:0 0 24px #7c5cff; animation: pulse 1.2s infinite ease-in-out; }
      #boot small { color:#8a90a2; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
      @keyframes pulse { 0%,100%{ transform:scale(.6); opacity:.5 } 50%{ transform:scale(1); opacity:1 } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="boot"><div class="dot"></div><small>TempoKey</small></div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
