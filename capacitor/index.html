<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0A0D14" />
    <meta name="format-detection" content="telephone=no" />
    <title>TempoKey</title>
    <link rel="icon" type="image/png" href="./tempokey-logo.png" />
    <style>
      html, body, #app { background:#0A0D14; color:#e6e8ee; }
      html, body { margin:0; padding:0; min-height:100dvh; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      /* Boot fallback — replaced by React mount */
      #boot { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px; background:#0A0D14; }
      #boot img { width: 96px; height: 96px; object-fit: contain; filter: drop-shadow(0 8px 28px rgba(124,92,255,0.25)); animation: float 2.2s infinite ease-in-out; }
      #boot small { color:#8a90a2; font-size:12px; letter-spacing:.14em; text-transform:uppercase; }
      @keyframes float { 0%,100%{ transform: translateY(0); opacity:.92 } 50%{ transform: translateY(-4px); opacity:1 } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="boot">
        <img src="./tempokey-logo.png" alt="TempoKey" />
        <small>TempoKey</small>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
