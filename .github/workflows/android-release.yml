name: Android Release (signed APK + AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versionName:
        description: "Semantic version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Integer version code (monotonic)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build TempoKey.apk + TempoKey.aab
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION_NAME: ${{ github.event.inputs.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.versionCode || github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            npx --yes pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Prepare Android project (SPA build + cap sync)
        run: bash scripts/prepare-android.sh

      - name: Stamp version
        run: bash scripts/android-version.sh "${VERSION_CODE}" "${VERSION_NAME}"

      # ── Signing ────────────────────────────────────────────────
      # Decode the release keystore from repo secrets. Supports both the
      # canonical `ANDROID_KEYSTORE_BASE64` secret and the legacy
      # `ANDROID_KEYSTORE` name. If neither is present, generate an
      # ephemeral CI keystore so the workflow still produces a signed APK
      # (an unsigned release APK is rejected by Android).
      - name: Resolve signing config
        id: signing
        env:
          ANDROID_KEYSTORE_B64_NEW: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_B64_OLD: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -e
          mkdir -p android/app
          KS=android/app/tempokey-release.keystore

          B64="${ANDROID_KEYSTORE_B64_NEW:-$ANDROID_KEYSTORE_B64_OLD}"

          if [ -n "$B64" ] && [ -n "$ANDROID_KEY_ALIAS" ] \
             && [ -n "$ANDROID_KEY_PASSWORD" ] && [ -n "$ANDROID_STORE_PASSWORD" ]; then
            echo "::notice::Using repository-supplied release keystore."
            printf '%s' "$B64" | base64 -d > "$KS"
            ALIAS="$ANDROID_KEY_ALIAS"
            KPW="$ANDROID_KEY_PASSWORD"
            SPW="$ANDROID_STORE_PASSWORD"
            SIGNED_BY="repo-secret"
          else
            echo "::warning::No release keystore secrets — generating an ephemeral CI keystore."
            ALIAS="tempokey"
            KPW="tempokey-ci-pass"
            SPW="tempokey-ci-pass"
            SIGNED_BY="ephemeral-ci"
            keytool -genkeypair -v -keystore "$KS" \
              -alias "$ALIAS" -storepass "$SPW" -keypass "$KPW" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=TempoKey CI, OU=Build, O=TempoKey, L=NA, S=NA, C=US"
          fi

          # Diagnostic output (no secrets leak).
          if [ -f "$KS" ]; then
            echo "✓ keystore present: $KS ($(stat -c%s "$KS" 2>/dev/null || stat -f%z "$KS") bytes)"
          else
            echo "❌ keystore missing at $KS" >&2
            exit 1
          fi
          echo "✓ alias configured: ${ALIAS}"
          echo "✓ signing source: ${SIGNED_BY}"

          # Validate the keystore actually contains the alias.
          if keytool -list -keystore "$KS" -storepass "$SPW" -alias "$ALIAS" >/dev/null 2>&1; then
            echo "✓ alias '${ALIAS}' found inside keystore"
          else
            echo "❌ alias '${ALIAS}' NOT found in keystore — check secrets" >&2
            keytool -list -keystore "$KS" -storepass "$SPW" 2>/dev/null | grep -i alias || true
            exit 1
          fi

          {
            echo "ALIAS=$ALIAS"
            echo "KPW=$KPW"
            echo "SPW=$SPW"
          } >> "$GITHUB_OUTPUT"

      - name: Inject signing config into android/app/build.gradle
        run: |
          cat >> android/app/build.gradle <<'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("tempokey-release.keystore")
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLE
          echo "✓ signing block appended to android/app/build.gradle"

      - name: Build Release APK + AAB
        working-directory: android
        env:
          ANDROID_KEY_ALIAS: ${{ steps.signing.outputs.ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.KPW }}
          ANDROID_STORE_PASSWORD: ${{ steps.signing.outputs.SPW }}
        run: |
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Locate, rename & verify artifacts
        id: verify
        run: |
          set -e
          mkdir -p artifacts

          APK="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)"
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "❌ No release APK produced." >&2
            find android/app/build/outputs -maxdepth 5 -type f || true
            exit 1
          fi
          cp "$APK" artifacts/TempoKey.apk
          echo "Produced APK: artifacts/TempoKey.apk ($(du -h artifacts/TempoKey.apk | cut -f1))"

          AAB="$(find android/app/build/outputs/bundle/release -name '*.aab' | head -n1 || true)"
          if [ -n "$AAB" ] && [ -f "$AAB" ]; then
            cp "$AAB" artifacts/TempoKey.aab
            echo "Produced AAB: artifacts/TempoKey.aab ($(du -h artifacts/TempoKey.aab | cut -f1))"
          else
            echo "::warning::No AAB produced (bundleRelease may have failed)."
          fi

          # Verify APK signature with apksigner (fails the build if invalid).
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* 2>/dev/null | sort -V | tail -n1)"
          if [ -z "$BT" ] || [ ! -x "$BT/apksigner" ]; then
            echo "::warning::apksigner not found, skipping verification."
          else
            echo "Verifying APK signature with $BT/apksigner…"
            "$BT/apksigner" verify --verbose artifacts/TempoKey.apk
            "$BT/apksigner" verify --print-certs artifacts/TempoKey.apk | head -n 20
            echo "✓ APK signature valid"
          fi

      - name: Upload TempoKey APK
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-APK-v${{ env.VERSION_NAME }}
          path: artifacts/TempoKey.apk
          if-no-files-found: error

      - name: Upload TempoKey AAB
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-AAB-v${{ env.VERSION_NAME }}
          path: artifacts/TempoKey.aab
          if-no-files-found: warn
