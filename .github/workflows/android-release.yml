name: Build TempoKey Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versionName:
        description: "Semantic version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Integer version code"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: TempoKey.apk
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION_NAME: ${{ github.event.inputs.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.versionCode || github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK (+ build-tools for apksigner)
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare Android project (SPA build + Capacitor sync)
        run: bash scripts/prepare-android.sh

      - name: Stamp version
        run: bash scripts/android-version.sh "${VERSION_CODE}" "${VERSION_NAME}"

      - name: Build single signed APK (debug keystore — always installable)
        working-directory: android
        run: |
          # The debug build type is signed with Android's auto-generated debug
          # keystore. The resulting APK installs on any device and is exactly
          # what we want for sideloading & internal distribution.
          # (For Play Store, generate a release keystore and bundle separately.)
          ./gradlew --no-daemon clean assembleDebug

      - name: Locate, rename & verify APK
        id: apk
        run: |
          set -e
          SRC=$(find android/app/build/outputs/apk -name "app-debug.apk" | head -n1)
          if [ -z "$SRC" ] || [ ! -f "$SRC" ]; then
            echo "❌ No APK produced by gradle" >&2
            find android/app/build/outputs -type f >&2 || true
            exit 1
          fi
          mkdir -p artifacts
          OUT="artifacts/TempoKey.apk"
          cp "$SRC" "$OUT"
          echo "Built APK: $OUT ($(stat -c%s "$OUT") bytes)"

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          APKSIGNER="${BUILD_TOOLS}apksigner"
          if [ -x "$APKSIGNER" ]; then
            echo "▶ Verifying APK signature with $APKSIGNER"
            "$APKSIGNER" verify --verbose "$OUT"
          else
            echo "⚠ apksigner not found at $APKSIGNER — falling back to jarsigner"
            jarsigner -verify -verbose "$OUT" | tail -n 5
          fi
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload TempoKey.apk
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-v${{ env.VERSION_NAME }}-build${{ env.VERSION_CODE }}
          path: artifacts/TempoKey.apk
          if-no-files-found: error
