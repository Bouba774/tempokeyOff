name: Android Release (single signed APK)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versionName:
        description: "Semantic version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Integer version code (monotonic)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build TempoKey.apk
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION_NAME: ${{ github.event.inputs.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.versionCode || github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            npx --yes pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Prepare Android project (SPA build + cap sync)
        run: bash scripts/prepare-android.sh

      - name: Stamp version
        run: bash scripts/android-version.sh "${VERSION_CODE}" "${VERSION_NAME}"

      # ── Signing ────────────────────────────────────────────────
      # Use the provided release keystore if the repo secrets are set,
      # otherwise generate a deterministic keystore on the runner so we
      # ALWAYS ship a signed release APK (an unsigned APK is rejected
      # by Android with "package appears to be invalid").
      - name: Resolve signing config
        id: signing
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -e
          mkdir -p android/app
          KS=android/app/release.keystore
          if [ -n "$ANDROID_KEYSTORE_B64" ] && [ -n "$ANDROID_KEY_ALIAS" ] \
             && [ -n "$ANDROID_KEY_PASSWORD" ] && [ -n "$ANDROID_STORE_PASSWORD" ]; then
            echo "Using repository-supplied release keystore."
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$KS"
            ALIAS="$ANDROID_KEY_ALIAS"
            KPW="$ANDROID_KEY_PASSWORD"
            SPW="$ANDROID_STORE_PASSWORD"
          else
            echo "::warning::No release keystore secrets — generating an ephemeral CI keystore."
            ALIAS="tempokey"
            KPW="tempokey-ci-pass"
            SPW="tempokey-ci-pass"
            keytool -genkeypair -v -keystore "$KS" \
              -alias "$ALIAS" -storepass "$SPW" -keypass "$KPW" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=TempoKey CI, OU=Build, O=TempoKey, L=NA, S=NA, C=US"
          fi
          {
            echo "ALIAS=$ALIAS"
            echo "KPW=$KPW"
            echo "SPW=$SPW"
          } >> "$GITHUB_OUTPUT"

      - name: Inject signing config into android/app/build.gradle
        env:
          ALIAS: ${{ steps.signing.outputs.ALIAS }}
          KPW: ${{ steps.signing.outputs.KPW }}
          SPW: ${{ steps.signing.outputs.SPW }}
        run: |
          cat >> android/app/build.gradle <<GRADLE

          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword System.getenv('SPW')
                      keyAlias System.getenv('ALIAS')
                      keyPassword System.getenv('KPW')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLE

      - name: Build Release APK
        working-directory: android
        env:
          ALIAS: ${{ steps.signing.outputs.ALIAS }}
          KPW: ${{ steps.signing.outputs.KPW }}
          SPW: ${{ steps.signing.outputs.SPW }}
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Locate, rename & verify APK
        id: verify
        run: |
          set -e
          mkdir -p artifacts
          APK="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)"
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "❌ No release APK produced." >&2
            find android/app/build/outputs -maxdepth 5 -type f || true
            exit 1
          fi
          OUT="artifacts/TempoKey.apk"
          cp "$APK" "$OUT"
          echo "Produced: $OUT ($(du -h "$OUT" | cut -f1))"

          # Verify signature with apksigner (fails the build if invalid).
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* 2>/dev/null | sort -V | tail -n1)"
          if [ -z "$BT" ] || [ ! -x "$BT/apksigner" ]; then
            echo "::warning::apksigner not found, skipping verification."
          else
            echo "Verifying with $BT/apksigner…"
            "$BT/apksigner" verify --verbose "$OUT"
            "$BT/apksigner" verify --print-certs "$OUT" | head -n 20
          fi
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload TempoKey.apk
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-v${{ env.VERSION_NAME }}
          path: artifacts/TempoKey.apk
          if-no-files-found: error
