name: Android Build (APK + AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versionName:
        description: "Semantic version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      versionCode:
        description: "Integer version code (monotonic)"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  build:
    name: Build TempoKey Android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION_NAME: ${{ github.event.inputs.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.versionCode || github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Environment info
        run: |
          node --version
          npm --version
          bun --version
          pwd
          ls -la
          echo "package.json: $(test -f package.json && echo yes || echo no)"
          echo "bun.lock: $(test -f bun.lock && echo yes || echo no)"
          echo "package-lock.json: $(test -f package-lock.json && echo yes || echo no)"

      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            npx --yes pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Format / TypeScript / lint (non-blocking)
        run: |
          npx prettier --check . || echo "::warning::Prettier formatting issues"
          npx tsc --noEmit || echo "::warning::TypeScript reported issues"
          npm run lint || echo "::warning::Lint reported issues"

      - name: Prepare Android project
        run: bash scripts/prepare-android.sh

      - name: Stamp version
        run: bash scripts/android-version.sh "${VERSION_CODE}" "${VERSION_NAME}"

      - name: Decode keystore (release signing, optional)
        id: keystore
        if: ${{ env.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE" | base64 -d > android/app/release.keystore
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Configure signing (optional)
        if: steps.keystore.outputs.configured == 'true'
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat >> android/app/build.gradle <<GRADLE

          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword System.getenv('STORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          GRADLE

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Build Release APK
        working-directory: android
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease || ./gradlew --no-daemon assembleDebug

      - name: Build Release AAB
        working-directory: android
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease || echo "::warning::AAB build skipped"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/apk artifacts/aab
          find android/app/build/outputs/apk -name "*.apk" -exec \
            sh -c 'cp "$1" "artifacts/apk/TempoKey-v${VERSION_NAME}-$(basename $(dirname $1)).apk"' _ {} \; || true
          find android/app/build/outputs/bundle -name "*.aab" -exec \
            cp {} "artifacts/aab/TempoKey-v${VERSION_NAME}.aab" \; || true
          ls -R artifacts || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-APK-v${{ env.VERSION_NAME }}
          path: artifacts/apk/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: TempoKey-AAB-v${{ env.VERSION_NAME }}
          path: artifacts/aab/*.aab
          if-no-files-found: warn
